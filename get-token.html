<!DOCTYPE html>
<html>
<head>
    <title>Get Firebase Token</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
    <h1>Firebase Authentication</h1>
    
    <div id="login">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="login()">Login</button>
    </div>
    
    <div id="token" style="display:none;">
        <h2>Your Firebase ID Token:</h2>
        <textarea id="tokenText" rows="10" cols="80" readonly></textarea>
        <br>
        <button onclick="copyToken()">Copy Token</button>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCs8Fo_V_Rkl_ZLilJDhidS85nNlRbWkc4",
            authDomain: "music-app-e8267.firebaseapp.com",
            projectId: "music-app-e8267"
        };
        
        firebase.initializeApp(firebaseConfig);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const token = await userCredential.user.getIdToken();
                
                document.getElementById('tokenText').value = token;
                document.getElementById('login').style.display = 'none';
                document.getElementById('token').style.display = 'block';
                
                console.log('Token:', token);
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        }

        function copyToken() {
            const tokenText = document.getElementById('tokenText');
            tokenText.select();
            document.execCommand('copy');
            alert('Token copied to clipboard!');
        }

        function logout() {
            firebase.auth().signOut();
            document.getElementById('login').style.display = 'block';
            document.getElementById('token').style.display = 'none';
        }
    </script>
</body>
</html>
